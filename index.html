<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paradise Nursery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F3EC;
    --forest: #2C4A2E;
    --sage: #6B8F6E;
    --moss: #4A6741;
    --gold: #C8944A;
    --earth: #8B6340;
    --light-sage: #E8F0E9;
    --white: #FDFCF9;
    --dark: #1A2B1B;
    --text: #2C3E2D;
    --muted: #7A8B7B;
    --border: rgba(44,74,46,0.15);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--forest); letter-spacing: 0.02em; cursor: pointer; }
  .header-logo span { color: var(--gold); font-style: italic; }
  .header-right { display: flex; align-items: center; gap: 1.5rem; }
  .nav-link { font-size: 0.875rem; font-weight: 500; color: var(--muted); cursor: pointer; text-decoration: none; transition: color 0.2s; letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-link:hover { color: var(--forest); }
  .cart-btn {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--forest); color: #fff;
    border: none; border-radius: 24px; padding: 0.45rem 1rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .cart-btn:hover { background: var(--moss); }
  .cart-icon { width: 18px; height: 18px; }
  .cart-count {
    background: var(--gold); color: #fff; border-radius: 50%;
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
  }

  /* LANDING PAGE */
  .landing {
    min-height: 100vh;
    display: grid; grid-template-rows: 1fr auto;
    position: relative;
    overflow: hidden;
  }
  .landing-hero {
    position: relative;
    background: linear-gradient(135deg, #1a2b1b 0%, #2c4a2e 40%, #4a6741 70%, #6b8f6e 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 6rem 2rem 4rem;
  }
  .landing-leaves {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .leaf {
    position: absolute; opacity: 0.12;
    font-size: 4rem;
    animation: drift 8s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(8deg); }
  }
  .landing-content { position: relative; z-index: 2; max-width: 640px; }
  .landing-eyebrow {
    display: inline-block; background: rgba(200,148,74,0.2); color: var(--gold);
    border: 1px solid rgba(200,148,74,0.4); border-radius: 20px;
    padding: 0.3rem 1rem; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .landing-title { font-size: clamp(2.8rem, 7vw, 5rem); color: #fff; line-height: 1.1; margin-bottom: 1.5rem; }
  .landing-title em { color: var(--gold); }
  .landing-desc { font-size: 1.05rem; color: rgba(255,255,255,0.75); line-height: 1.75; max-width: 480px; margin: 0 auto 2.5rem; }
  .btn-primary {
    display: inline-block; background: var(--gold); color: #fff;
    border: none; border-radius: 28px; padding: 0.85rem 2.2rem;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
    text-decoration: none;
  }
  .btn-primary:hover { background: #b8832f; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,148,74,0.35); }
  .landing-stats {
    display: flex; justify-content: center; gap: 3rem; margin-top: 4rem;
    padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #fff; }
  .stat-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 0.2rem; }

  /* PRODUCTS PAGE */
  .page { padding: 2.5rem 2rem 4rem; max-width: 1200px; margin: 0 auto; }
  .page-header { margin-bottom: 2.5rem; }
  .page-title { font-size: 2.2rem; color: var(--forest); }
  .page-subtitle { color: var(--muted); margin-top: 0.35rem; font-size: 0.95rem; }
  .category-section { margin-bottom: 3rem; }
  .category-label {
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
    color: var(--moss); background: var(--light-sage); display: inline-block;
    padding: 0.3rem 0.85rem; border-radius: 12px; margin-bottom: 1.25rem;
  }
  .category-title { font-size: 1.5rem; color: var(--forest); margin-bottom: 1.5rem; }
  .plants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }
  .plant-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; transition: all 0.25s; display: flex; flex-direction: column;
  }
  .plant-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(44,74,46,0.1); border-color: rgba(44,74,46,0.25); }
  .plant-img {
    width: 100%; height: 180px; object-fit: cover; display: flex; align-items: center; justify-content: center;
    font-size: 5rem;
    background: var(--light-sage);
  }
  .plant-body { padding: 1rem 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; }
  .plant-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--forest); margin-bottom: 0.25rem; }
  .plant-latin { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-bottom: 0.6rem; }
  .plant-price { font-size: 1.1rem; font-weight: 600; color: var(--earth); margin-top: auto; margin-bottom: 0.85rem; }
  .add-btn {
    width: 100%; background: var(--forest); color: #fff;
    border: none; border-radius: 10px; padding: 0.6rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .add-btn:hover { background: var(--moss); }
  .add-btn.added { background: var(--gold); }

  /* CART PAGE */
  .cart-page { max-width: 900px; }
  .cart-summary {
    display: flex; gap: 1.5rem; margin-bottom: 2.5rem; flex-wrap: wrap;
  }
  .summary-card {
    flex: 1; min-width: 160px;
    background: var(--white); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.25rem 1.5rem; text-align: center;
  }
  .summary-num { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--forest); }
  .summary-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }
  .cart-actions { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--forest); color: var(--forest);
    border-radius: 24px; padding: 0.65rem 1.6rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-outline:hover { background: var(--forest); color: #fff; }
  .btn-checkout {
    background: var(--gold); border: none; color: #fff;
    border-radius: 24px; padding: 0.65rem 2rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-checkout:hover { background: #b8832f; }
  .cart-items { display: flex; flex-direction: column; gap: 1rem; }
  .cart-item {
    background: var(--white); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 1.25rem;
  }
  .cart-item-emoji { font-size: 2.8rem; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; background: var(--light-sage); border-radius: 12px; flex-shrink: 0; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--forest); }
  .cart-item-unit { font-size: 0.82rem; color: var(--muted); margin-top: 0.15rem; }
  .cart-item-total { font-weight: 600; color: var(--earth); font-size: 1rem; min-width: 70px; text-align: right; }
  .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border);
    background: var(--white); color: var(--forest); font-size: 1rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:hover { background: var(--forest); color: #fff; border-color: var(--forest); }
  .qty-num { font-size: 0.95rem; font-weight: 600; min-width: 24px; text-align: center; color: var(--text); }
  .del-btn {
    background: none; border: none; color: #ccc; cursor: pointer; font-size: 1rem;
    transition: color 0.2s; padding: 0.25rem;
  }
  .del-btn:hover { color: #e74c3c; }
  .cart-empty { text-align: center; padding: 5rem 2rem; }
  .cart-empty-icon { font-size: 4rem; margin-bottom: 1rem; }
  .cart-empty h2 { font-family: 'Playfair Display', serif; color: var(--forest); font-size: 1.6rem; margin-bottom: 0.75rem; }
  .cart-empty p { color: var(--muted); margin-bottom: 2rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

  @media (max-width: 600px) {
    .header { padding: 0 1rem; }
    .page { padding: 1.5rem 1rem 3rem; }
    .landing-stats { gap: 1.5rem; }
    .cart-item { flex-wrap: wrap; gap: 0.75rem; }
    .cart-summary { gap: 0.75rem; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useCallback } = React;

const PLANTS = [
  { id: 1, name: "Monstera Deliciosa", latin: "Monstera deliciosa", emoji: "🌿", price: 34.99, category: "Tropical Beauties" },
  { id: 2, name: "Bird of Paradise", latin: "Strelitzia reginae", emoji: "🌺", price: 49.99, category: "Tropical Beauties" },
  { id: 3, name: "Peace Lily", latin: "Spathiphyllum wallisii", emoji: "🌸", price: 22.99, category: "Tropical Beauties" },
  { id: 4, name: "Snake Plant", latin: "Sansevieria trifasciata", emoji: "🌵", price: 18.99, category: "Easy Growers" },
  { id: 5, name: "Pothos", latin: "Epipremnum aureum", emoji: "🍃", price: 12.99, category: "Easy Growers" },
  { id: 6, name: "ZZ Plant", latin: "Zamioculcas zamiifolia", emoji: "🌱", price: 27.99, category: "Easy Growers" },
  { id: 7, name: "Fiddle Leaf Fig", latin: "Ficus lyrata", emoji: "🌳", price: 64.99, category: "Statement Plants" },
  { id: 8, name: "Rubber Tree", latin: "Ficus elastica", emoji: "🌲", price: 38.99, category: "Statement Plants" },
  { id: 9, name: "Chinese Evergreen", latin: "Aglaonema commutatum", emoji: "🌿", price: 21.99, category: "Statement Plants" },
];

const CATEGORIES = ["Tropical Beauties", "Easy Growers", "Statement Plants"];

function App() {
  const [page, setPage] = useState("landing");
  const [cart, setCart] = useState({});

  const cartCount = Object.values(cart).reduce((s, q) => s + q, 0);
  const cartTotal = Object.entries(cart).reduce((s, [id, q]) => {
    const p = PLANTS.find(pl => pl.id === parseInt(id));
    return s + (p ? p.price * q : 0);
  }, 0);

  const addToCart = useCallback((id) => {
    setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
  }, []);

  const updateQty = useCallback((id, delta) => {
    setCart(prev => {
      const newQty = (prev[id] || 0) + delta;
      if (newQty <= 0) {
        const next = { ...prev };
        delete next[id];
        return next;
      }
      return { ...prev, [id]: newQty };
    });
  }, []);

  const removeItem = useCallback((id) => {
    setCart(prev => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
  }, []);

  return React.createElement(React.Fragment, null,
    page !== "landing" && React.createElement(Header, { page, setPage, cartCount }),
    page === "landing" && React.createElement(LandingPage, { setPage }),
    page === "products" && React.createElement(ProductsPage, { addToCart, cart }),
    page === "cart" && React.createElement(CartPage, { cart, cartCount, cartTotal, updateQty, removeItem, setPage }),
  );
}

function Header({ page, setPage, cartCount }) {
  return React.createElement("header", { className: "header" },
    React.createElement("div", { className: "header-logo", onClick: () => setPage("landing") },
      "Paradise ", React.createElement("span", null, "Nursery")
    ),
    React.createElement("div", { className: "header-right" },
      page === "cart"
        ? React.createElement("span", { className: "nav-link", onClick: () => setPage("products") }, "← Shop")
        : null,
      page === "products"
        ? React.createElement("span", { className: "nav-link", onClick: () => setPage("landing") }, "Home")
        : null,
      React.createElement("button", { className: "cart-btn", onClick: () => setPage("cart") },
        React.createElement("svg", { className: "cart-icon", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2" },
          React.createElement("path", { d: "M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" }),
          React.createElement("line", { x1: "3", y1: "6", x2: "21", y2: "6" }),
          React.createElement("path", { d: "M16 10a4 4 0 01-8 0" })
        ),
        "Cart",
        React.createElement("span", { className: "cart-count" }, cartCount)
      )
    )
  );
}

function LandingPage({ setPage }) {
  const leaves = ["🌿","🍃","🌱","🌾","🌵","🍂","🌺","🌸"];
  const positions = [
    {top:"5%",left:"3%",delay:"0s"},{top:"15%",right:"5%",delay:"1.5s"},
    {top:"40%",left:"1%",delay:"3s"},{bottom:"20%",left:"8%",delay:"0.8s"},
    {bottom:"10%",right:"3%",delay:"2.2s"},{top:"65%",right:"8%",delay:"4s"},
    {top:"30%",left:"88%",delay:"1s"},{bottom:"35%",left:"88%",delay:"2.5s"},
  ];

  return React.createElement("div", { className: "landing" },
    React.createElement("div", { className: "landing-hero" },
      React.createElement("div", { className: "landing-leaves" },
        positions.map((pos, i) =>
          React.createElement("div", {
            key: i, className: "leaf",
            style: { ...pos, animationDelay: pos.delay }
          }, leaves[i % leaves.length])
        )
      ),
      React.createElement("div", { className: "landing-content" },
        React.createElement("div", { className: "landing-eyebrow" }, "🌿 Welcome to paradise"),
        React.createElement("h1", { className: "landing-title" },
          "Bring Nature ", React.createElement("em", null, "Home")
        ),
        React.createElement("p", { className: "landing-desc" },
          "Paradise Nursery is your sanctuary for premium houseplants. From lush tropicals to architectural statement pieces, we hand-select every plant to ensure it arrives vibrant and ready to thrive. Transform your living space into a living garden."
        ),
        React.createElement("button", { className: "btn-primary", onClick: () => setPage("products") },
          "Get Started →"
        ),
        React.createElement("div", { className: "landing-stats" },
          React.createElement("div", { className: "stat" },
            React.createElement("div", { className: "stat-num" }, "50+"),
            React.createElement("div", { className: "stat-label" }, "Plant varieties")
          ),
          React.createElement("div", { className: "stat" },
            React.createElement("div", { className: "stat-num" }, "3"),
            React.createElement("div", { className: "stat-label" }, "Curated collections")
          ),
          React.createElement("div", { className: "stat" },
            React.createElement("div", { className: "stat-num" }, "∞"),
            React.createElement("div", { className: "stat-label" }, "Good vibes")
          )
        )
      )
    )
  );
}

function ProductsPage({ addToCart, cart }) {
  const [added, setAdded] = useState({});
  const handleAdd = (id) => {
    addToCart(id);
    setAdded(prev => ({ ...prev, [id]: true }));
    setTimeout(() => setAdded(prev => ({ ...prev, [id]: false })), 1200);
  };

  return React.createElement("div", { className: "page" },
    React.createElement("div", { className: "page-header" },
      React.createElement("h1", { className: "page-title" }, "Our Plants"),
      React.createElement("p", { className: "page-subtitle" }, "Hand-picked houseplants for every space and lifestyle")
    ),
    CATEGORIES.map(cat =>
      React.createElement("div", { key: cat, className: "category-section" },
        React.createElement("div", { className: "category-label" }, cat),
        React.createElement("div", { className: "plants-grid" },
          PLANTS.filter(p => p.category === cat).map(plant =>
            React.createElement("div", { key: plant.id, className: "plant-card" },
              React.createElement("div", { className: "plant-img" }, plant.emoji),
              React.createElement("div", { className: "plant-body" },
                React.createElement("div", { className: "plant-name" }, plant.name),
                React.createElement("div", { className: "plant-latin" }, plant.latin),
                React.createElement("div", { className: "plant-price" }, "$" + plant.price.toFixed(2)),
                React.createElement("button", {
                  className: "add-btn" + (added[plant.id] ? " added" : ""),
                  onClick: () => handleAdd(plant.id)
                }, added[plant.id] ? "✓ Added!" : cart[plant.id] ? `Add More (${cart[plant.id]})` : "Add to Cart")
              )
            )
          )
        )
      )
    )
  );
}

function CartPage({ cart, cartCount, cartTotal, updateQty, removeItem, setPage }) {
  const cartItems = Object.entries(cart).map(([id, qty]) => {
    const plant = PLANTS.find(p => p.id === parseInt(id));
    return { ...plant, qty };
  });

  if (cartItems.length === 0) {
    return React.createElement("div", { className: "page cart-page" },
      React.createElement(Header, { page: "cart", setPage, cartCount }),
      React.createElement("div", { className: "cart-empty" },
        React.createElement("div", { className: "cart-empty-icon" }, "🛒"),
        React.createElement("h2", null, "Your cart is empty"),
        React.createElement("p", null, "Looks like you haven't added any plants yet."),
        React.createElement("button", { className: "btn-primary", onClick: () => setPage("products") }, "Browse Plants")
      )
    );
  }

  return React.createElement("div", { className: "page cart-page" },
    React.createElement("div", { className: "page-header" },
      React.createElement("h1", { className: "page-title" }, "Your Cart"),
      React.createElement("p", { className: "page-subtitle" }, "Review your selection before checkout")
    ),
    React.createElement("div", { className: "cart-summary" },
      React.createElement("div", { className: "summary-card" },
        React.createElement("div", { className: "summary-num" }, cartCount),
        React.createElement("div", { className: "summary-label" }, "Total plants")
      ),
      React.createElement("div", { className: "summary-card" },
        React.createElement("div", { className: "summary-num" }, cartItems.length),
        React.createElement("div", { className: "summary-label" }, "Varieties")
      ),
      React.createElement("div", { className: "summary-card" },
        React.createElement("div", { className: "summary-num" }, "$" + cartTotal.toFixed(2)),
        React.createElement("div", { className: "summary-label" }, "Total cost")
      )
    ),
    React.createElement("div", { className: "cart-actions" },
      React.createElement("button", { className: "btn-outline", onClick: () => setPage("products") }, "← Continue Shopping"),
      React.createElement("button", { className: "btn-checkout", onClick: () => alert("Thank you for your order! 🌿") }, "Checkout — $" + cartTotal.toFixed(2))
    ),
    React.createElement("hr", { className: "divider" }),
    React.createElement("div", { className: "cart-items" },
      cartItems.map(item =>
        React.createElement("div", { key: item.id, className: "cart-item" },
          React.createElement("div", { className: "cart-item-emoji" }, item.emoji),
          React.createElement("div", { className: "cart-item-info" },
            React.createElement("div", { className: "cart-item-name" }, item.name),
            React.createElement("div", { className: "cart-item-unit" }, "$" + item.price.toFixed(2) + " each")
          ),
          React.createElement("div", { className: "qty-controls" },
            React.createElement("button", { className: "qty-btn", onClick: () => updateQty(item.id, -1) }, "−"),
            React.createElement("span", { className: "qty-num" }, item.qty),
            React.createElement("button", { className: "qty-btn", onClick: () => updateQty(item.id, 1) }, "+")
          ),
          React.createElement("div", { className: "cart-item-total" }, "$" + (item.price * item.qty).toFixed(2)),
          React.createElement("button", { className: "del-btn", onClick: () => removeItem(item.id), title: "Remove" }, "✕")
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
